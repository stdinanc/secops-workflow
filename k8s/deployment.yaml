apiVersion: apps/v1
kind: Deployment
metadata:
  name: secops-vulnerable-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secops-vulnerable-demo
  template:
    metadata:
      labels:
        app: secops-vulnerable-demo
    spec:
      containers:
        - name: app
          image: secops-vulnerable-demo:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          securityContext:
            privileged: true
            runAsUser: 0
            allowPrivilegeEscalation: true
          env:
            - name: APP_PASSWORD
              value: "dummy-password-for-scanner"
---
apiVersion: v1
kind: Service
metadata:
  name: secops-vulnerable-demo
spec:
  type: NodePort
  selector:
    app: secops-vulnerable-demo
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
