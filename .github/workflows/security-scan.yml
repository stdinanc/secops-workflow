name: SecOps Test Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-scan:
    name: Build and Security Scan
    runs-on: [self-hosted, devsecops-trial]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare cache directories
        run: |
          mkdir -p .ci-cache/m2/repository
          mkdir -p .ci-cache/sonar
          mkdir -p .ci-cache/trivy

      - name: Build and SonarQube Scan inside Maven container
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          docker run --rm \
            --network host \
            --user "$(id -u):$(id -g)" \
            -v "$PWD":/workspace \
            -w /workspace \
            -e SONAR_TOKEN="$SONAR_TOKEN" \
            -e SONAR_HOST_URL="$SONAR_HOST_URL" \
            maven:3.9.6-eclipse-temurin-17 \
            bash -c '
              mvn -B clean package -DskipTests \
                -Dmaven.repo.local=/workspace/.ci-cache/m2/repository &&
              mvn -B org.sonarsource.scanner.maven:sonar-maven-plugin:4.0.0.4121:sonar \
                -Dmaven.repo.local=/workspace/.ci-cache/m2/repository \
                -Dsonar.userHome=/workspace/.ci-cache/sonar \
                -Dsonar.projectKey=devsecops-security-pipeline \
                -Dsonar.projectName=devsecops-security-pipeline \
                -Dsonar.host.url="$SONAR_HOST_URL" \
                -Dsonar.token="$SONAR_TOKEN"
            '

      - name: Build Docker image
        run: |
          docker build -t secops-vulnerable-demo:${{ github.sha }} .

      - name: Configure Maven local repo for Trivy
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings>
            <localRepository>$PWD/.ci-cache/m2/repository</localRepository>
            <offline>true</offline>
          </settings>
          EOF

      - name: Trivy Filesystem Scan
        env:
          TRIVY_CACHE_DIR: ${{ github.workspace }}/.ci-cache/trivy
        run: |
          trivy fs \
            --exit-code 0 \
            --severity LOW,MEDIUM,HIGH,CRITICAL \
            --format table \
            --timeout 20m \
            .

      - name: Trivy Docker Image Scan
        env:
          TRIVY_CACHE_DIR: ${{ github.workspace }}/.ci-cache/trivy
        run: |
          trivy image \
            --exit-code 0 \
            --severity LOW,MEDIUM,HIGH,CRITICAL \
            --format table \
            --timeout 20m \
            secops-vulnerable-demo:${{ github.sha }}

      - name: Trivy IaC Scan
        env:
          TRIVY_CACHE_DIR: ${{ github.workspace }}/.ci-cache/trivy
        run: |
          trivy config \
            --exit-code 0 \
            --severity LOW,MEDIUM,HIGH,CRITICAL \
            --format table \
            --timeout 20m \
            .

      - name: Cleanup temporary files and project image
        if: always()
        run: |
          rm -rf .ci-cache
          docker rmi secops-vulnerable-demo:${{ github.sha }} || true